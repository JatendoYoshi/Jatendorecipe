<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roll the Ball — Scoreboard</title>
  <link rel="stylesheet" href="rolltheball.css" />
</head>
<body>
  <h1>Roll the Ball Scoreboard</h1>

  <div class="scoreboard">

    <!-- Team A -->
    <div class="team" id="teamA">
      <div class="team-header">
        <input type="text" id="teamANameInput" value="Team A" />
        <button onclick="updateTeamName('A')">Update Name</button>
      </div>
      <h2 id="teamAName">Team A</h2>

      <div class="score" id="scoreA">100</div>

      <div class="round-controls">
        <label for="addScoreA">Add Round Score:</label>
        <input type="number" id="addScoreA" value="0" min="0" />
        <button onclick="confirmRound('A')">Confirm Round</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Owned</th>
            <th>Plays Used</th>
            <th>Max Plays</th>
            <th>Refund</th>
          </tr>
        </thead>
        <tbody id="itemsA"></tbody>
      </table>

      <!-- Additional Prizes Section -->
      <div class="prizes">
        <h3>Additional Prizes</h3>

        <div class="token-display">
          Gold Tokens: <span id="goldA">0</span>
          <button onclick="addToken('A','gold')">+ Add Gold</button>
          &nbsp;&nbsp;|&nbsp;&nbsp;
          Silver Tokens: <span id="silverA">0</span>
          <button onclick="addToken('A','silver')">+ Add Silver</button>
        </div>

        <div class="redeem-options">
          <button onclick="redeemAsScore('A','gold')">Redeem Gold (+50)</button>
          <button onclick="redeemAsScore('A','silver')">Redeem Silver (+20)</button>
          <button onclick="redeemItem('A')">Redeem for Item</button>
        </div>
      </div>
    </div>

    <!-- Team B -->
    <div class="team" id="teamB">
      <div class="team-header">
        <input type="text" id="teamBNameInput" value="Team B" />
        <button onclick="updateTeamName('B')">Update Name</button>
      </div>
      <h2 id="teamBName">Team B</h2>

      <div class="score" id="scoreB">100</div>

      <div class="round-controls">
        <label for="addScoreB">Add Round Score:</label>
        <input type="number" id="addScoreB" value="0" min="0" />
        <button onclick="confirmRound('B')">Confirm Round</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Owned</th>
            <th>Plays Used</th>
            <th>Max Plays</th>
            <th>Refund</th>
          </tr>
        </thead>
        <tbody id="itemsB"></tbody>
      </table>

      <!-- Additional Prizes Section -->
      <div class="prizes">
        <h3>Additional Prizes</h3>

        <div class="token-display">
          Gold Tokens: <span id="goldB">0</span>
          <button onclick="addToken('B','gold')">+ Add Gold</button>
          &nbsp;&nbsp;|&nbsp;&nbsp;
          Silver Tokens: <span id="silverB">0</span>
          <button onclick="addToken('B','silver')">+ Add Silver</button>
        </div>

        <div class="redeem-options">
          <button onclick="redeemAsScore('B','gold')">Redeem Gold (+50)</button>
          <button onclick="redeemAsScore('B','silver')">Redeem Silver (+20)</button>
          <button onclick="redeemItem('B')">Redeem for Item</button>
        </div>
      </div>
    </div>

  </div>

<!-- Reset Game Button -->
<button id="resetGameBtn" onclick="resetGame()" style="background:#e74c3c;">Reset Game</button>


  <script src="rolltheball.js"></script>
</body>
</html>
